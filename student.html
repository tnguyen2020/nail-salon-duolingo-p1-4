<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Tech — Customer Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe4f0, #fff0f5);
            min-height: 100vh;
            padding: 20px;
        }

        .header-banner {
            background: #e91e8c;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Customer selector tabs */
        .customer-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .customer-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 12px;
            border: 3px solid transparent;
            background: white;
            transition: all 0.2s;
            min-width: 80px;
        }

        .customer-tab.active {
            border-color: #e91e8c;
            box-shadow: 0 0 0 2px #f9a8d4;
        }

        .customer-tab .emoji {
            font-size: 36px;
        }

        .customer-tab .label {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
        }

        .customer-tab .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
            margin-top: 4px;
        }

        .customer-tab.completed .dot {
            background: #4caf50;
        }

        /* Score bar */
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 60px;
            background: white;
            border-radius: 12px;
            padding: 15px 30px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .score-item {
            text-align: center;
        }

        .score-number {
            font-size: 24px;
            font-weight: bold;
        }

        .score-number.correct { color: #4caf50; }
        .score-number.streak { color: #ff9800; }
        .score-number.wrong { color: #f44336; }

        .score-label {
            font-size: 13px;
            color: #777;
            margin-top: 2px;
        }

        /* Customer card */
        .customer-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 700px;
            margin: 0 auto 20px;
        }

        .customer-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f9a8d4;
        }

        .customer-avatar {
            font-size: 48px;
        }

        .customer-info h2 {
            font-size: 22px;
            color: #333;
        }

        .customer-info p {
            color: #888;
            font-size: 14px;
        }

        /* Background card */
        .background-card {
            background: #fff8fc;
            border: 2px dashed #f9a8d4;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .background-card h3 {
            color: #e91e8c;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .background-card p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        .background-card .tag {
            display: inline-block;
            background: #fce4ec;
            color: #e91e8c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
        }

        /* Question fields */
        .question-field {
            background: #fafafa;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 15px;
            border: 1px solid #f0f0f0;
        }

        .question-field .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .field-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }

        .field-title .icon {
            font-size: 20px;
        }

        .hint-btn {
            color: #e91e8c;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
        }

        .hint-text {
            background: #fff3e0;
            border-left: 3px solid #ff9800;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
            display: none;
        }

        .hint-text.visible {
            display: block;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .answer-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .answer-input:focus {
            border-color: #e91e8c;
        }

        .answer-input.correct {
            border-color: #4caf50;
            background: #f1fff4;
        }

        .answer-input.wrong {
            border-color: #f44336;
            background: #fff5f5;
        }

        .check-btn {
            background: #e91e8c;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .check-btn:hover {
            background: #c2185b;
        }

        .check-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-text {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .result-text.correct { color: #4caf50; }
        .result-text.wrong { color: #f44336; }

        /* Dialogue sample */
        .dialogue-box {
            background: #f3e5f5;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .dialogue-box h3 {
            color: #7b1fa2;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .dialogue-line {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .dialogue-line .speaker {
            font-weight: bold;
            color: #e91e8c;
        }

        .dialogue-line .speaker.client {
            color: #7b1fa2;
        }

        /* Next customer button */
        .next-btn {
            background: linear-gradient(135deg, #e91e8c, #c2185b);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: transform 0.2s;
        }

        .next-btn:hover {
            transform: scale(1.05);
        }

        /* Completion message */
        .completion-msg {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .completion-msg h2 {
            font-size: 28px;
            color: #e91e8c;
            margin-bottom: 10px;
        }

        .completion-msg p {
            color: #666;
            font-size: 16px;
        }

        /* Area info section */
        .area-info {
            background: #e8f5e9;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-left: 4px solid #4caf50;
        }

        .area-info h3 {
            color: #2e7d32;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .area-info p {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>

// ============================================================
// STATE
// ============================================================
let currentCustomer = 0;
let scores = { correct: 0, streak: 0, wrong: 0 };
let completedCustomers = [];

// ============================================================
// BUILD TABS
// ============================================================
function buildTabs() {
    const container = document.getElementById('customerTabs');
    container.innerHTML = '';
    customers.forEach((c, i) => {
        const tab = document.createElement('div');
        tab.className = 'customer-tab' + (i === currentCustomer ? ' active' : '') + (completedCustomers.includes(i) ? ' completed' : '');
        tab.innerHTML = `
            <div class="emoji">${c.emoji}</div>
            <div class="label">${c.label}</div>
            <div class="dot"></div>
        `;
        tab.addEventListener('click', () => {
            currentCustomer = i;
            buildTabs();
            buildCustomerCard();
        });
        container.appendChild(tab);
    });
}

// ============================================================
// BUILD CUSTOMER CARD
// ============================================================
function buildCustomerCard() {
    const c = customers[currentCustomer];
    const bg = c.background;
    const card = document.getElementById('customerCard');

    // Dialogue HTML
    let dialogueHTML = c.dialogue.map(line => `
        <div class="dialogue-line">
            <span class="speaker ${line.speaker === 'Client' ? 'client' : ''}">${line.speaker}:</span>
            ${line.text}
        </div>
    `).join('');

    // Tags HTML
    let tagsHTML = bg.tags.map(t => `<span class="tag">${t}</span>`).join('');

    // Questions HTML
    let questionsHTML = c.questions.map((q, qi) => `
        <div class="question-field" id="field-${qi}">
            <div class="field-header">
                <div class="field-title">
                    <span class="icon">${q.icon}</span>
                    ${q.label}
                </div>
                <button class="hint-btn" onclick="toggleHint(${qi})">💡 Show Hint</button>
            </div>
            <div class="hint-text" id="hint-${qi}">${q.hint}</div>
            <div class="input-row">
                <input 
                    type="text" 
                    class="answer-input" 
                    id="input-${qi}" 
                    placeholder="${q.placeholder}"
                    onkeypress="if(event.key==='Enter') checkAnswer(${qi})"
                />
                <button class="check-btn" id="btn-${qi}" onclick="checkAnswer(${qi})">Check</button>
            </div>
            <div class="result-text" id="result-${qi}"></div>
        </div>
    `).join('');

    card.innerHTML = `
        <div class="customer-header">
            <div class="customer-avatar">${c.emoji}</div>
            <div class="customer-info">
                <h2>Customer ${c.id}</h2>
                <p>${c.subtitle}</p>
            </div>
        </div>

        <!-- Background Info -->
        <div class="background-card">
            <h3>📋 Customer Background (For Study)</h3>
            <p>
                <strong>Name:</strong> ${bg.name} &nbsp;|&nbsp;
                <strong>Lives in:</strong> ${bg.area} &nbsp;|&nbsp;
                <strong>First Time:</strong> ${bg.firstTime === 'yes' ? 'Yes ✅' : 'No — returning client'} &nbsp;|&nbsp;
                <strong>Appointment:</strong> ${bg.appointment === 'yes' ? 'Yes ✅' : 'No — walk-in'}
            </p>
            <div style="margin-top:8px;">${tagsHTML}</div>
        </div>

        <!-- Area Info -->
        <div class="area-info">
            <h3>📍 About This Area</h3>
            <p>${bg.areaFact}</p>
        </div>

        <!-- Sample Dialogue -->
        <div class="dialogue-box">
            <h3>💬 Sample Conversation</h3>
            ${dialogueHTML}
        </div>

        <!-- Questions -->
        <div id="questionsContainer">
            ${questionsHTML}
        </div>

        <button class="next-btn" onclick="nextCustomer()">
            ${currentCustomer < customers.length - 1 ? 'Next Customer ➡️' : '🎉 Finish!'}
        </button>
    `;

    document.getElementById('completionMsg').style.display = 'none';
}

// ============================================================
// TOGGLE HINT
// ============================================================
function toggleHint(qi) {
    const hint = document.getElementById(`hint-${qi}`);
    const btn = hint.previousElementSibling.querySelector('.hint-btn');
    hint.classList.toggle('visible');
    btn.textContent = hint.classList.contains('visible') ? '💡 Hide Hint' : '💡 Show Hint';
}

// CHECK ANSWER
// ============================================================
function checkAnswer(qi) {
    const c = customers[currentCustomer];
    const q = c.questions[qi];
    const input = document.getElementById(`input-${qi}`);
    const result = document.getElementById(`result-${qi}`);
    const btn = document.getElementById(`btn-${qi}`);

    const userAnswer = input.value.trim().toLowerCase();

    if (!userAnswer) return;

    const isCorrect = q.answers.some(a => userAnswer === a.toLowerCase());

    if (isCorrect) {
        input.className = 'answer-input correct';
        result.className = 'result-text correct';
        result.textContent = '✅ Correct! Great job!';
        btn.disabled = true;
        scores.correct++;
        scores.streak++;
    } else {
        input.className = 'answer-input wrong';
        result.className = 'result-text wrong';
        result.textContent = `❌ Not quite. The answer is: "${q.answers[0]}"`;
        scores.wrong++;
        scores.streak = 0;
    }

    updateScores();
}

// ============================================================
// UPDATE SCORES
// ============================================================
function updateScores() {
    document.getElementById('correctCount').textContent = scores.correct;
    document.getElementById('streakCount').textContent = scores.streak;
    document.getElementById('wrongCount').textContent = scores.wrong;
}

// ============================================================
// NEXT CUSTOMER
// ============================================================
function nextCustomer() {
    if (!completedCustomers.includes(currentCustomer)) {
        completedCustomers.push(currentCustomer);
    }

    if (currentCustomer < customers.length - 1) {
        currentCustomer++;
        buildTabs();
        buildCustomerCard();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        // All done
        buildTabs();
        document.getElementById('customerCard').style.display = 'none';
        document.getElementById('completionMsg').style.display = 'block';
    }
}

// ============================================================
// INIT
// ============================================================
buildTabs();
buildCustomerCard();
</script>
