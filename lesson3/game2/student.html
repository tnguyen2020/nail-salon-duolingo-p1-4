<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 3 Game 2 - Nail Tech Practice</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff0f8, #e8fff8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #20c997, #12b886);
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 0.98rem;
      opacity: 0.95;
    }

    .content {
      padding: 28px 22px 24px;
    }

    .progress-wrap {
      margin-bottom: 22px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.92rem;
      color: #666;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 12px;
      background: #f1f1f1;
      border-radius: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #20c997, #12b886);
      border-radius: 30px;
      transition: width 0.3s ease;
    }

    .card {
      background: #fcfcfc;
      border: 2px solid #f1f1f1;
      border-radius: 18px;
      padding: 24px 18px;
      margin-bottom: 20px;
    }

    .speaker-label {
      display: inline-block;
      background: #6f42c1;
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .question {
      font-size: 1.4rem;
      color: #333;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 16px;
      text-align: left;
      font-size: 1rem;
      background: #f7f7f9;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid transparent;
    }

    .choice-btn:hover {
      background: #eefcf8;
      border-color: #20c997;
    }

    .choice-btn.correct {
      background: #d1fae5;
      border-color: #20c997;
      color: #065f46;
      font-weight: 600;
    }

    .choice-btn.wrong {
      background: #ffe1e1;
      border-color: #dc3545;
      color: #842029;
      font-weight: 600;
    }

    .feedback {
      margin-top: 18px;
      font-size: 1rem;
      font-weight: 700;
      min-height: 24px;
    }

    .feedback.correct {
      color: #198754;
    }

    .feedback.wrong {
      color: #dc3545;
    }

    .controls {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s ease;
    }

    .btn-next {
      background: linear-gradient(135deg, #20c997, #12b886);
      color: white;
    }

    .btn-next:hover {
      filter: brightness(1.05);
    }

    .btn-back {
      background: #6c757d;
      color: white;
    }

    .btn-home {
      background: #d63384;
      color: white;
    }

    .hidden {
      display: none;
    }

    .score-screen {
      text-align: center;
      padding: 10px 0 6px;
    }

    .score-screen h2 {
      color: #198754;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .score-screen p {
      color: #555;
      font-size: 1.05rem;
      margin-bottom: 20px;
    }

    .final-score {
      font-size: 1.3rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 22px;
    }

    @media (max-width: 600px) {
      .question {
        font-size: 1.2rem;
      }

      .choice-btn {
        font-size: 0.96rem;
      }

      .controls {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>💅 Nail Tech Practice</h1>
      <p>Choose the best answer to respond to the customer.</p>
    </div>

    <div class="content">
      <div class="progress-wrap">
        <div class="progress-text">
          <span id="progressText">Question 1 of 8</span>
          <span id="scoreText">Score: 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div id="quizScreen">
        <div class="card">
          <div class="speaker-label">CUSTOMER</div>
          <div class="question" id="questionText"></div>

          <div class="choices" id="choicesBox"></div>

          <div id="feedback" class="feedback"></div>

          <div class="controls">
            <button id="nextBtn" class="btn btn-next hidden">Next</button>
            <a href="index.html" class="btn btn-back">← Back to Game 2</a>
            <a href="../../index.html" class="btn btn-home">🏠 All Lessons</a>
          </div>
        </div>
      </div>

      <div id="resultScreen" class="score-screen hidden">
        <h2>Great job! 🎉</h2>
        <p>You finished the conversation practice.</p>
        <div class="final-score" id="finalScore"></div>
        <div class="controls" style="justify-content:center;">
          <button class="btn btn-next" onclick="restartGame()">Play Again</button>
          <a href="index.html" class="btn btn-back">← Back to Game 2</a>
          <a href="../../index.html" class="btn btn-home">🏠 All Lessons</a>
        </div>
      </div>
    </div>
  </div>
<script>
  const questions = [
    {
      question: "My name is Lisa. Nice to meet you!",
      choices: [
        "Nice to meet you too.",
        "My name is Lisa too.",
        "Welcome back again."
      ],
      answer: "Nice to meet you too."
    },
    {
      question: "Is this your first time here?",
      choices: [
        "Yes, it is my first time.",
        "Yes, I come here every month.",
        "No, I have two kids."
      ],
      answer: "Yes, it is my first time."
    },
    {
      question: "Do you have an appointment?",
      choices: [
        "Yes, I do.",
        "Yes, I am.",
        "Yes, I have kids."
      ],
      answer: "Yes, I do."
    },
    {
      question: "Are you married?",
      choices: [
        "Yes, I am.",
        "Yes, I do.",
        "Yes, I have."
      ],
      answer: "Yes, I am."
    },
    {
      question: "Do you have kids?",
      choices: [
        "Yes, I have two kids.",
        "Yes, they are two kids.",
        "Yes, I am two kids."
      ],
      answer: "Yes, I have two kids."
    },
    {
      question: "How old are you?",
      choices: [
        "I’m 35 years old.",
        "My son is 10 years old.",
        "Yes, I am 35."
      ],
      answer: "I’m 35 years old."
    },
    {
      question: "How old are your kids?",
      choices: [
        "My son is 10 and my daughter is 7.",
        "I am 35 years old.",
        "They are going to school."
      ],
      answer: "My son is 10 and my daughter is 7."
    },
    {
      question: "Are they going to school?",
      choices: [
        "Yes, both of them are in school.",
        "Yes, both of them are 10 years old.",
        "Yes, I go to school."
      ],
      answer: "Yes, both of them are in school."
    },
    {
      question: "This is my daughter.",
      choices: [
        "She is very cute.",
        "I have two daughter.",
        "She are very cute."
      ],
      answer: "She is very cute."
    },
    {
      question: "Ah-choo!",
      choices: [
        "Bless you!",
        "Thank you very much!",
        "Nice to meet you!"
      ],
      answer: "Bless you!"
    }
  ];

  let currentQuestion = 0;
  let score = 0;
  let answeredCorrectly = false;

  const questionText = document.getElementById("questionText");
  const choicesBox = document.getElementById("choicesBox");
  const feedback = document.getElementById("feedback");
  const nextBtn = document.getElementById("nextBtn");
  const progressText = document.getElementById("progressText");
  const scoreText = document.getElementById("scoreText");
  const progressFill = document.getElementById("progressFill");
  const quizScreen = document.getElementById("quizScreen");
  const resultScreen = document.getElementById("resultScreen");
  const finalScore = document.getElementById("finalScore");

  function renderQuestion() {
    answeredCorrectly = false;
    const q = questions[currentQuestion];
    questionText.textContent = q.question;
    choicesBox.innerHTML = "";
    feedback.textContent = "";
    feedback.className = "feedback";
    nextBtn.classList.add("hidden");

    progressText.textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    scoreText.textContent = `Score: ${score}`;
    progressFill.style.width = `${(currentQuestion / questions.length) * 100}%`;

    q.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.textContent = choice;
      btn.onclick = () => checkAnswer(btn, choice, q.answer);
      choicesBox.appendChild(btn);
    });
  }

  function checkAnswer(button, selected, correct) {
    if (answeredCorrectly) return;

    const allButtons = document.querySelectorAll(".choice-btn");

    if (selected === correct) {
      answeredCorrectly = true;
      score++;

      allButtons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct) {
          btn.classList.add("correct");
        }
      });

      feedback.textContent = "Correct!";
      feedback.className = "feedback correct";
      scoreText.textContent = `Score: ${score}`;
      nextBtn.classList.remove("hidden");
    } else {
      button.classList.add("wrong");
      button.disabled = true;
      feedback.textContent = "Can you repeat it again?";
      feedback.className = "feedback wrong";
    }
  }

  nextBtn.addEventListener("click", () => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      renderQuestion();
    } else {
      showResults();
    }
  });

  function showResults() {
    quizScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");
    progressFill.style.width = "100%";
    finalScore.textContent = `Your score: ${score} / ${questions.length}`;
  }

  function restartGame() {
    currentQuestion = 0;
    score = 0;
    quizScreen.classList.remove("hidden");
    resultScreen.classList.add("hidden");
    renderQuestion();
  }

  renderQuestion();
</script>
</body>
</html>
