<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💁‍♀️ Nail Tech — Cửa 3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffe0f0, #fff0f5);
            min-height: 100vh; padding: 15px;
            max-width: 700px; margin: 0 auto;
        }
        .back-link {
            display: inline-block; margin-bottom: 10px; color: #d63384;
            text-decoration: none; font-size: 0.9rem; font-weight: bold;
        }
        .header {
            text-align: center; padding: 18px;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white; border-radius: 20px; margin-bottom: 15px;
        }
        .header h1 { font-size: 1.3rem; margin-bottom: 4px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }

        /* Customer Row */
        .customer-row {
            display: flex; gap: 8px; justify-content: center;
            margin-bottom: 15px; flex-wrap: wrap;
        }
        .customer-slot {
            display: flex; flex-direction: column; align-items: center;
            background: white; border: 3px solid #e0e0e0; border-radius: 15px;
            padding: 10px 8px; cursor: pointer; transition: all 0.3s;
            min-width: 60px; flex: 1; max-width: 80px; position: relative;
        }
        .customer-slot:hover { border-color: #ff69b4; transform: translateY(-2px); }
        .customer-slot.active {
            border-color: #ff1493; background: #fff0f5;
            box-shadow: 0 4px 12px rgba(255,20,147,0.2);
        }
        .customer-slot .av { font-size: 1.8rem; }
        .customer-slot .lb { font-size: 0.6rem; font-weight: bold; color: #888; margin-top: 3px; }
        .customer-slot.active .lb { color: #d63384; }
        .customer-slot .dot {
            width: 10px; height: 10px; border-radius: 50%; margin-top: 4px;
            background: #e0e0e0; transition: background 0.3s;
        }
        .customer-slot.done .dot { background: #28a745; }
        .customer-slot.in-progress .dot { background: #ffc107; }
        .customer-slot .star-badge {
            position: absolute; top: -6px; right: -6px; font-size: 0.75rem; display: none;
        }
        .customer-slot.done .star-badge { display: block; }

        /* Score Bar */
        .score-bar {
            display: flex; justify-content: space-around; align-items: center;
            background: white; border-radius: 15px; padding: 12px;
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .score-item { text-align: center; }
        .score-item .num { font-size: 1.4rem; font-weight: bold; }
        .score-item .lbl { font-size: 0.7rem; color: #888; }
        .s-correct .num { color: #28a745; }
        .s-wrong .num { color: #dc3545; }
        .s-streak .num { color: #ff9800; }

        /* Info Card */
        .info-card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px;
        }
        .info-card-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .info-card-header .av { font-size: 2.5rem; }
        .info-card-header .info h2 { font-size: 1.1rem; color: #333; }
        .info-card-header .info p { font-size: 0.8rem; color: #999; }

        /* Hint Link & Content */
        .hint-link {
            color: #e91e93;
            cursor: pointer;
            font-size: 0.82rem;
            text-decoration: none;
            display: inline-block;
            margin: 5px 0;
            font-weight: bold;
            user-select: none;
            transition: all 0.2s;
        }
        .hint-link:hover {
            text-decoration: underline;
            color: #c4157b;
        }
        .hint-content {
            display: none;
            margin-top: 4px;
        }
        .hint-content.show {
            display: block;
        }

        /* Field Row */
        .field-row {
            margin-bottom: 14px; padding: 14px;
            background: #fafafa; border-radius: 14px;
            border: 2px solid #f0f0f0;
            transition: all 0.3s;
        }
        .field-row.correct { border-color: #28a745; background: #f0fff0; }
        .field-row.wrong { border-color: #dc3545; background: #fff5f5; }

        .field-label {
            display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
        }
        .field-label .icon { font-size: 1.2rem; }
        .field-label .text { font-size: 0.9rem; font-weight: bold; color: #555; }
        .field-label .vn { font-size: 0.75rem; color: #aaa; font-style: italic; margin-left: auto; }

        .field-question {
            font-size: 0.8rem; color: #6f42c1; margin-bottom: 8px;
            padding: 6px 10px; background: #f0e6ff; border-radius: 8px;
            border-left: 3px solid #6f42c1;
        }

        .field-input-row { display: flex; gap: 8px; align-items: center; }
        .field-input {
            flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0;
            border-radius: 12px; font-size: 1rem; outline: none;
            transition: border-color 0.3s;
        }
        .field-input:focus { border-color: #ff69b4; }
        .field-input:disabled { background: #f5f5f5; color: #333; }

        .btn-check {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white; border: none; padding: 12px 20px;
            border-radius: 12px; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .btn-check:hover { transform: scale(1.05); box-shadow: 0 3px 10px rgba(255,20,147,0.3); }

        .field-result { font-size: 1.2rem; flex-shrink: 0; }

        .field-feedback {
            margin-top: 8px; padding: 8px 12px; border-radius: 8px;
            font-size: 0.85rem; display: none;
        }
        .field-feedback.fb-correct { display: block; background: #d4edda; color: #155724; }
        .field-feedback.fb-wrong { display: block; background: #f8d7da; color: #721c24; }

        /* Complete Screen */
        .complete-screen {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center; display: none; margin-bottom: 15px;
        }
        .complete-screen.show { display: block; }
        .cp-emoji { font-size: 4rem; margin-bottom: 10px; }
        .cp-title { font-size: 1.3rem; color: #333; margin-bottom: 8px; }
        .cp-score { font-size: 2.5rem; font-weight: bold; color: #ff1493; }
        .cp-stars { font-size: 2.2rem; margin: 10px 0; }
        .cp-msg { color: #888; margin-bottom: 20px; }
        .btn-action {
            border: none; padding: 14px 28px; border-radius: 25px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            margin: 5px; color: white; transition: all 0.2s;
            display: inline-block; text-decoration: none;
        }
        .btn-action:hover { transform: scale(1.05); }
        .btn-pink { background: linear-gradient(135deg, #ff69b4, #ff1493); }
        .btn-purple { background: linear-gradient(135deg, #6f42c1, #5a32a3); }
        .btn-green { background: linear-gradient(135deg, #28a745, #20c997); }

        @media (max-width: 400px) {
            .customer-slot { min-width: 52px; padding: 8px 5px; }
            .customer-slot .av { font-size: 1.5rem; }
            .field-input-row { flex-wrap: wrap; }
            .btn-check { width: 100%; }
        }
    </style>
</head>

let active = 0;
let states = customers.map(c => ({
    correct: 0, wrong: 0, streak: 0,
    answered: new Array(c.fields.length).fill(false),
    results: new Array(c.fields.length).fill(null),
    done: false
}));

function switchCustomer(idx) {
    active = idx;
    document.querySelectorAll('.customer-slot').forEach((s, i) =>
        s.classList.toggle('active', i === idx)
    );
    render();
}

function toggleHint(link) {
    const hintContent = link.nextElementSibling;
    if (hintContent.classList.contains('show')) {
        hintContent.classList.remove('show');
        link.innerHTML = '💡 Show Hint';
    } else {
        hintContent.classList.add('show');
        link.innerHTML = '💡 Hide Hint';
    }
}

function render() {
    const st = states[active];
    const c = customers[active];

    document.querySelectorAll('.customer-slot').forEach((s, i) => {
        s.classList.remove('done', 'in-progress');
        if (states[i].done) s.classList.add('done');
        else if (states[i].answered.some(a => a)) s.classList.add('in-progress');
    });

    document.getElementById('numCorrect').textContent = st.correct;
    document.getElementById('numWrong').textContent = st.wrong;
    document.getElementById('numStreak').textContent = st.streak;

    if (st.done) {
        document.getElementById('infoCard').style.display = 'none';
        showComplete(); return;
    }
    document.getElementById('infoCard').style.display = 'block';
    document.getElementById('completeScreen').classList.remove('show');

    document.getElementById('cardAvatar').textContent = c.avatar;
    document.getElementById('cardTitle').textContent = c.name;
    document.getElementById('cardDesc').textContent = c.desc;

    const container = document.getElementById('fieldsContainer');
    container.innerHTML = '';

    c.fields.forEach((f, i) => {
        const row = document.createElement('div');
        row.className = 'field-row' + (st.answered[i] ? (st.results[i] ? ' correct' : ' wrong') : '');
        row.id = 'field-' + i;

        let inputArea = '';
        if (st.answered[i]) {
            inputArea = `
                <input type="text" class="field-input" value="${f.display}" disabled>
                <span class="field-result">${st.results[i] ? '✅' : '❌'}</span>
            `;
        } else {
            inputArea = `
                <input type="text" class="field-input" id="input-${i}"
                       placeholder="Type the answer..."
                       onkeypress="if(event.key==='Enter')checkField(${i})"
                       autocomplete="off">
                <button class="btn-check" onclick="checkField(${i})">Check</button>
            `;
        }

        // Build hint section (only for unanswered fields)
        let hintSection = '';
        if (!st.answered[i]) {
            hintSection = `
                <div class="hint-container">
                    <a class="hint-link" onclick="toggleHint(this)">💡 Show Hint</a>
                    <div class="hint-content">
                        <div class="field-question">🗣️ ${f.question}</div>
                    </div>
                </div>
            `;
        }

        row.innerHTML = `
            <div class="field-label">
                <span class="icon">${f.icon}</span>
                <span class="text">${f.label}</span>
                <span class="vn">${f.vn}</span>
            </div>
            ${hintSection}
            <div class="field-input-row">${inputArea}</div>
            <div class="field-feedback" id="fb-${i}"></div>
        `;
        container.appendChild(row);
    });
}

function checkField(idx) {
    const st = states[active];
    const f = customers[active].fields[idx];
    const input = document.getElementById('input-' + idx);
    const val = input.value.trim().toLowerCase();

    if (!val) { input.focus(); return; }

    const ansLower = f.answer.toLowerCase();
    const isCorrect = val.includes(ansLower) || ansLower.includes(val);

    st.answered[idx] = true;
    st.results[idx] = isCorrect;

    if (isCorrect) { st.correct++; st.streak++; }
    else { st.wrong++; st.streak = 0; }

    render();

    const fb = document.getElementById('fb-' + idx);
    if (fb) {
        if (isCorrect) {
            fb.className = 'field-feedback fb-correct';
            fb.textContent = '✅ Correct!';
        } else {
            fb.className = 'field-feedback fb-wrong';
            fb.textContent = '❌ Answer: ' + f.display;
        }
    }

    if (st.answered.every(a => a)) {
        st.done = true;
        setTimeout(() => {
            document.getElementById('infoCard').style.display = 'none';
            showComplete();
        }, 1000);
    }
}

function showComplete() {
    const st = states[active];
    const c = customers[active];
    const total = c.fields.length;
    const pct = total > 0 ? Math.round((st.correct / total) * 100) : 0;

    document.getElementById('completeScreen').classList.add('show');
    document.getElementById('cpTitle').textContent = c.name + ' — Complete!';
    document.getElementById('cpScore').textContent = st.correct + ' / ' + total;

    let stars = '', msg = '';
    if (pct >= 100) { stars = '⭐⭐⭐'; msg = '🎉 PERFECT! Every detail correct!'; }
    else if (pct >= 75) { stars = '⭐⭐'; msg = '👏 Great job! Almost perfect!'; }
    else if (pct >= 50) { stars = '⭐'; msg = '💪 Good effort! Try again!'; }
    else { stars = ''; msg = '📚 Keep practicing! Listen carefully!'; }

    document.getElementById('cpStars').textContent = stars;
    document.getElementById('cpMsg').textContent = msg;

    document.querySelectorAll('.customer-slot').forEach((s, i) => {
        s.classList.remove('done', 'in-progress');
        if (states[i].done) s.classList.add('done');
        else if (states[i].answered.some(a => a)) s.classList.add('in-progress');
    });
}

function restartCustomer() {
    const c = customers[active];
    states[active] = {
        correct: 0, wrong: 0, streak: 0,
        answered: new Array(c.fields.length).fill(false),
        results: new Array(c.fields.length).fill(null),
        done: false
    };
    document.getElementById('completeScreen').classList.remove('show');
    document.getElementById('infoCard').style.display = 'block';
    render();
}

function nextCustomer() {
    let next = active + 1;
    if (next >= customers.length) next = 0;
    switchCustomer(next);
}

render();
</script>
</body>
</html>
