<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 4 Game 2 - Nail Tech</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .game-container {
      max-width: 680px;
      margin: 0 auto;
    }

    .listen-box {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      margin-bottom: 20px;
    }

    .listen-box .round-num {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .listen-box .listen-text {
      font-size: 1.15rem;
      color: var(--text);
      font-weight: 600;
      line-height: 1.5;
    }

    .listen-box .listen-sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .image-card {
      position: relative;
      border: 3px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      background: white;
      transition: 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .image-card:active {
      transform: scale(0.97);
    }

    .image-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .image-card.correct {
      border-color: #10b981;
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.2);
    }

    .image-card.correct::after {
      content: '✅';
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 1.5rem;
      background: white;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .image-card.wrong {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .image-card.wrong::after {
      content: '❌';
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 1.3rem;
      background: white;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .image-card.disabled {
      pointer-events: none;
      opacity: 0.4;
    }

    .feedback-bar {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      min-height: 28px;
      margin-bottom: 14px;
    }

    .feedback-bar.correct { color: #047857; }
    .feedback-bar.wrong { color: #dc2626; }

    .game-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .game-controls .btn {
      width: 100%;
      max-width: 320px;
    }

    @media (min-width: 700px) {
      .image-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .image-card img {
        height: 160px;
      }

      .game-controls {
        flex-direction: row;
        justify-content: center;
      }

      .game-controls .btn {
        width: auto;
      }
    }

    @media (max-width: 380px) {
      .image-card img {
        height: 110px;
      }

      .image-grid {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="app-shell">
      <div class="page-header student">
        <h1>💅 Nail Tech</h1>
        <p>Listen and click the correct place.</p>
      </div>

      <div class="page-body">
        <div class="game-container">
          <div class="top-info">
            <span id="progressText">Question 1 of 15</span>
            <span id="scoreText">Score: 0</span>
          </div>

          <div class="progress-bar">
            <div class="progress-fill student" id="progressFill"></div>
          </div>

          <div id="gameScreen">
           <div class="listen-box">
  <div class="round-num" id="roundLabel">ROUND 1</div>
  <div id="sentenceBox" class="sentence-box"></div>
</div>



            <div class="image-grid" id="imageGrid"></div>

            <div id="feedback" class="feedback-bar"></div>


            <div class="game-controls">
              <button id="nextBtn" class="btn btn-student hidden">Next</button>
              <a href="index.html" class="btn btn-secondary">← Back</a>
              <a href="../../index.html" class="btn btn-home">🏠 Home</a>
            </div>
          </div>

          <div id="resultScreen" class="center-screen hidden">
            <h2>Great job! 🎉</h2>
            <p>You finished the salon direction practice.</p>
            <div class="final-score" id="finalScore"></div>

            <div class="game-controls">
              <button class="btn btn-student" onclick="restartGame()">Play Again</button>
              <a href="index.html" class="btn btn-secondary">← Back</a>
              <a href="../../index.html" class="btn btn-home">🏠 Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
const spots = [
  { id: "table1", img: "images/chair1.jpg", num: "1" },
  { id: "table2", img: "images/chair2.jpg", num: "2" },
  { id: "pedicure1", img: "images/pedicure1.jpg", num: "1" },
  { id: "pedicure2", img: "images/pedicure2.jpg", num: "2" },
  { id: "colorwall", img: "images/colorwall.jpg", num: "" },
  { id: "handwash", img: "images/handwash.jpg", num: "" },
  { id: "waiting", img: "images/waiting.jpg", num: "" },
  { id: "restroom", img: "images/restroom.jpg", num: "" },
  { id: "dryer", img: "images/dryer.jpg", num: "" },
  { id: "frontdesk", img: "images/frontdesk.jpg", num: "" }
];

const questions = [
  { answer: "table1", sentence: "Please have a seat _______." },
  { answer: "pedicure1", sentence: "Please _______ with me." },
  { answer: "colorwall", sentence: "The _______ is over here." },
  { answer: "handwash", sentence: "Please wash your hands _______." },
  { answer: "waiting", sentence: "Yes, please wait here for a _______." },
  { answer: "table2", sentence: "Yes, this _______ is for you." },
  { answer: "restroom", sentence: "The restroom is _______ there." },
  { answer: "pedicure2", sentence: "The _______ chair is over there." },
  { answer: "frontdesk", sentence: "Please go to the _______ to check in." },
  { answer: "dryer", sentence: "Please put your hands under the _______." },
  { answer: "colorwall", sentence: "The color wall is over _______." },
  { answer: "waiting", sentence: "Yes, please _______ here." },
  { answer: "handwash", sentence: "Please _______ your hands over there." },
  { answer: "restroom", sentence: "The _______ is down the hall." },
  { answer: "table1", sentence: "Please come _______ me." },
  { answer: "frontdesk", sentence: "You can _______ at the front desk." },
  { answer: "dryer", sentence: "The dryer _______ is right here." },
  { answer: "table2", sentence: "The second _______ is over here." },
  { answer: "pedicure1", sentence: "The pedicure _______ is over there." },
  { answer: "waiting", sentence: "Please wait here for a _______." }
];

    let current = 0;
    let score = 0;
    let done = false;

    const imageGrid = document.getElementById("imageGrid");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const progressText = document.getElementById("progressText");
    const scoreText = document.getElementById("scoreText");
    const progressFill = document.getElementById("progressFill");
    const roundLabel = document.getElementById("roundLabel");
    const gameScreen = document.getElementById("gameScreen");
    const resultScreen = document.getElementById("resultScreen");
    const finalScore = document.getElementById("finalScore");

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

   function buildGrid() {
  imageGrid.innerHTML = "";
  const shuffled = shuffle(spots);

  shuffled.forEach(spot => {
    const card = document.createElement("div");
    card.className = "image-card";
    card.dataset.id = spot.id;

    let badgeHTML = "";
    if (spot.num) {
      badgeHTML = `<div class="number-badge">${spot.num}</div>`;
    }

    card.innerHTML = `
      ${badgeHTML}
      <img src="${spot.img}" alt="salon area" />
    `;

    card.addEventListener("click", () => handleTap(card, spot.id));
    imageGrid.appendChild(card);
  });
}
  function render() {
  done = false;
  feedback.textContent = "";
  feedback.className = "feedback-bar";
  nextBtn.classList.add("hidden");

  // Show sentence at the top
  document.getElementById("sentenceBox").textContent = questions[current].sentence;

  progressText.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreText.textContent = `Score: ${score}`;
  progressFill.style.width = `${(current / questions.length) * 100}%`;
  roundLabel.textContent = `ROUND ${current + 1}`;

  buildGrid();
}

    function handleTap(card, selectedId) {
  if (done) return;

  const correctId = questions[current].answer;

  if (selectedId === correctId) {
    done = true;
    score++;

    document.querySelectorAll(".image-card").forEach(c => {
      c.classList.add("disabled");
      if (c.dataset.id === correctId) c.classList.add("correct");
    });

    feedback.textContent = "Correct!";
    feedback.className = "feedback-bar correct";
    scoreText.textContent = `Score: ${score}`;
    nextBtn.classList.remove("hidden");

    // Show fill-in-the-blank sentence
  } else {
    card.classList.add("wrong");
    setTimeout(() => {
      card.classList.remove("wrong");
      card.classList.add("disabled");
    }, 500);
    feedback.textContent = "Can you repeat it again?";
    feedback.className = "feedback-bar wrong";
  }
}

    nextBtn.addEventListener("click", () => {
      current++;
      if (current < questions.length) {
        render();
      } else {
        gameScreen.classList.add("hidden");
        resultScreen.classList.remove("hidden");
        progressFill.style.width = "100%";
        finalScore.textContent = `Your score: ${score} / ${questions.length}`;
      }
    });

    function restartGame() {
      current = 0;
      score = 0;
      gameScreen.classList.remove("hidden");
      resultScreen.classList.add("hidden");
      render();
    }

    render();
  </script>
</body>
</html>
