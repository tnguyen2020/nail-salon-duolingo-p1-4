<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Practice - Levels</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
    <button class="back-btn" onclick="goBack()">← Back</button>


<h2>🎧 Listening Training</h2>
<p>Select level. Listen. Respond like a professional.</p>

<select id="levelSelect" onchange="changeLevel()">
<option value="easy">Easy</option>
<option value="real">Real Client</option>
<option value="hard">Difficult Client</option>
</select>

<div id="answers"></div>
<div id="notesBox"></div>

<button class="next-btn" onclick="nextQuestion()">Next</button>

</div>
<script src="data.js"></script>
<script src="app.js"></script>

<script>

function goBack() {
window.location.href = "index.html";
}

function loadQuestion() {

let data = gameData[currentLevel][current];

let answersDiv = document.getElementById("answers");
let notesBox = document.getElementById("notesBox");

answersDiv.innerHTML = "";
notesBox.innerHTML = "";

if (!data) {
current = 0;
return;
}

/* =========================
   QUESTION NUMBER
========================= */

let qNumber = document.createElement("p");
qNumber.innerText = "Question " + (current + 1);
qNumber.style.fontWeight = "600";
qNumber.style.marginBottom = "10px";
answersDiv.appendChild(qNumber);

/* =========================
   ANSWERS
========================= */

let shuffled = shuffle([...data.answers]);
let labels = ["A", "B", "C", "D"];

shuffled.forEach((ans, index) => {

let btn = document.createElement("button");
btn.innerText = labels[index] + ". " + ans.text;

btn.onclick = function () {

if (ans.correct) {

btn.classList.add("correct");

document.querySelectorAll("#answers button")
.forEach(b => b.disabled = true);

} else {
btn.classList.add("wrong");
btn.disabled = true;
}

};

answersDiv.appendChild(btn);
});

/* =========================
   NOTES (VIET TRANSLATION)
========================= */

if (data.notes && data.notes.length > 0) {

let title = document.createElement("p");
title.innerText = "💡 Key words:";
title.style.marginTop = "15px";
title.style.fontWeight = "600";
title.style.color = "#d63384";

notesBox.appendChild(title);

data.notes.forEach(n => {

let item = document.createElement("p");
item.innerText = n.en + " = " + n.vi;
item.style.fontSize = "13px";
item.style.color = "#555";
item.style.margin = "4px 0";

notesBox.appendChild(item);

});

}

}

function nextQuestion() {
current++;
if (current >= gameData[currentLevel].length) current = 0;
loadQuestion();
}

function changeLevel() {
currentLevel = document.getElementById("levelSelect").value;
current = 0;
loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
