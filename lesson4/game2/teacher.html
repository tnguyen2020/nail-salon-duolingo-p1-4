<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher - Client Role</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <button class="back-btn" onclick="goBack()">← Back</button>

    <h2>🗣 Teacher - Client Role</h2>
    <p>Read the line naturally. Student must listen and respond.</p>

    <select id="levelSelect" onchange="changeLevel()">
        <option value="easy">Easy</option>
        <option value="real">Real Client</option>
        <option value="hard">Difficult Client</option>
    </select>

    <div id="scenario" style="margin-top:20px; font-size:18px;"></div>

    <button class="next-btn" onclick="nextScenario()">Next Line</button>

</div>

<script src="data.js"></script>

<script>

let currentLevel = "easy";
let current = 0;

/* BACK BUTTON */
function goBack() {
window.location.href = "index.html";
}

/* LOAD QUESTION */
function loadScenario() {

let levelData = gameData?.[currentLevel];

if (!levelData || levelData.length === 0) {
document.getElementById("scenario").innerText = "No questions found.";
return;
}

if (!levelData[current]) {
current = 0;
}

let data = levelData[current];

document.getElementById("scenario").innerText =
"Question " + (current + 1) + ":\n\n" +
data.teacher;

}
/* NEXT */
function nextScenario() {

current++;

if (current >= gameData[currentLevel].length) {
current = 0;
}

loadScenario();

}

/* LEVEL CHANGE */
function changeLevel() {

currentLevel = document.getElementById("levelSelect").value;
current = 0;
loadScenario();

}

/* INIT */
loadScenario();

</script>

</body>
</html>
